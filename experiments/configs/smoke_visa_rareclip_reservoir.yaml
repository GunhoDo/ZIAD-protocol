# RareCLIP VisA Reservoir smoke run.
# This is paper-ineligible smoke evidence only.
baseline: RareCLIP
baseline_path: external/RareCLIP

dataset: VisA
dataset_root: data/visa/1cls
category: candle

memory_policy: Reservoir
reservoir_memory_size: 8
reservoir_seed: 0
calibration: none

stream_type: iid
prevalence: 0.05
contamination_epsilon: 0

stream:
  path: results/latest/stream_smoke_visa_rareclip_reservoir.json
  seed: 0
  length: 20
  burst_length: 5

outputs:
  scores_csv: results/latest/scores_visa_rareclip_reservoir.csv
  latest_run: results/latest/latest_run_visa_rareclip_reservoir.json
  manifest: results/latest/manifest_visa_rareclip_reservoir.json

provenance:
  scoring_mode: stream_ordered_online_zero_shot_reservoir
  latency_semantics: wrapper_single_image_online
  training_source: rareclip_mvtec_text_projection_checkpoint
  stream_source: test/*
