# Baseline registry for P0 experiment setup.
# repo_url and commit_hash are pinned from the current local clones under external/.
# Do not fabricate replacement URLs or pretend wrappers/checkpoints are configured before integration.

baselines:
  RareCLIP:
    name: RareCLIP
    local_path: external/RareCLIP
    repo_url: https://github.com/hjf02/RareCLIP.git
    commit_hash: a8e6d46ee2612a0edbf48c3b88e9998497e2b422
    checkpoint_path: external/RareCLIP/weights/mvtec_pretrained.pth
    setup_command: python3 -m pip install -r external/RareCLIP/requirements.txt
    smoke_command: bash scripts/run_smoke.sh experiments/configs/smoke_rareclip.yaml
    wrapper_module: experiments.baselines.rareclip
    expected_output_schema: "stream_index,image_path,label,category,anomaly_score,latency_ms,peak_vram_mb,status"

  PatchCore:
    name: PatchCore
    local_path: external/patchcore-inspection
    repo_url: https://github.com/amazon-science/patchcore-inspection.git
    commit_hash: fcaa92f124fb1ad74a7acf56726decd4b27cbcad
    checkpoint_path: TBD_or_not_required
    setup_command: python3 -m pip install -r external/patchcore-inspection/requirements.txt timm
    smoke_command: bash scripts/run_smoke.sh
    wrapper_module: experiments.baselines.patchcore
    expected_output_schema: "stream_index,image_path,label,category,anomaly_score,latency_ms,peak_vram_mb,status"

  WinCLIP:
    name: WinCLIP
    local_path: external/WinClip
    repo_url: https://github.com/caoyunkang/WinClip.git
    commit_hash: a2ee822d77d01fb7beaed54314e61fe34d5027a4
    checkpoint_path: TBD_or_not_required
    setup_command: python3 -m pip install open_clip_torch==2.23.0 ftfy
    smoke_command: bash scripts/run_smoke.sh experiments/configs/smoke_winclip.yaml
    wrapper_module: experiments.baselines.winclip
    expected_output_schema: "stream_index,image_path,label,category,anomaly_score,latency_ms,peak_vram_mb,status"

  AnomalyCLIP:
    name: AnomalyCLIP
    local_path: external/AnomalyCLIP
    repo_url: https://github.com/zqhang/AnomalyCLIP.git
    commit_hash: 3911738c0867544f545a076ad78f3f11d9ecbfdf
    checkpoint_path: external/AnomalyCLIP/checkpoints/9_12_4_multiscale/epoch_15.pth
    setup_command: python3 -m pip install -r external/AnomalyCLIP/requirements.txt
    smoke_command: bash scripts/run_smoke.sh experiments/configs/smoke_anomalyclip.yaml
    wrapper_module: experiments.baselines.anomalyclip
    expected_output_schema: "stream_index,image_path,label,category,anomaly_score,latency_ms,peak_vram_mb,status"
