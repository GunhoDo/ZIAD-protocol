# VisA all-category stream/epsilon smoke matrix for RareCLIP Reservoir memory policy.
# This is still paper-ineligible: short length-20 streams, no review, no MVTec.
dataset: VisA
dataset_root: data/visa/1cls
categories:
  - candle
  - capsules
  - cashew
  - chewinggum
  - fryum
  - macaroni1
  - macaroni2
  - pcb1
  - pcb2
  - pcb3
  - pcb4
  - pipe_fryum

baselines:
  - name: RareCLIP
    baseline_path: external/RareCLIP
    provenance:
      scoring_mode: stream_ordered_online_zero_shot_reservoir
      latency_semantics: wrapper_single_image_online
      training_source: rareclip_mvtec_text_projection_checkpoint
      stream_source: test/*

prevalence: 0.05
stream_types:
  - iid
  - bursty
contamination_epsilon:
  - 0
  - 0.01
  - 0.05
memory_policy: Reservoir
stream:
  seed: 0
  length: 20
  burst_length: 5

baseline_options:
  reservoir_memory_size: 8
  reservoir_seed: 0

outputs:
  root: results/latest/visa_full_category_stream_matrix_rareclip_reservoir
  aggregate_metrics: results/latest/visa_full_category_stream_matrix_rareclip_reservoir/metrics_visa_full_category_stream_matrix_rareclip_reservoir.csv
  aggregate_manifest: results/latest/visa_full_category_stream_matrix_rareclip_reservoir/manifest_visa_full_category_stream_matrix_rareclip_reservoir.json
  crd_lite_summary: results/latest/visa_full_category_stream_matrix_rareclip_reservoir/crd_lite_visa_full_category_stream_matrix_rareclip_reservoir.csv
  status: visa_full_category_stream_matrix_rareclip_reservoir_complete
  notes: VisA all-category RareCLIP Reservoir stream/epsilon smoke matrix only; not full P0 or paper gate.
