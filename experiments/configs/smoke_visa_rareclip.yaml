# RareCLIP VisA smoke run: validates VisA stream indexing with online image-level scoring.
# This is paper-ineligible smoke evidence only.
baseline: RareCLIP
baseline_path: external/RareCLIP

dataset: VisA
dataset_root: data/visa/1cls
category: candle

stream_type: iid
prevalence: 0.05
contamination_epsilon: 0

stream:
  path: results/latest/stream_smoke_visa_rareclip.json
  seed: 0
  length: 20
  burst_length: 5

outputs:
  scores_csv: results/latest/scores_visa_rareclip.csv
  latest_run: results/latest/latest_run_visa_rareclip.json
  manifest: results/latest/manifest_visa_rareclip.json

provenance:
  scoring_mode: stream_ordered_online_zero_shot
  latency_semantics: wrapper_single_image_online
  training_source: rareclip_mvtec_text_projection_checkpoint
  stream_source: test/*
