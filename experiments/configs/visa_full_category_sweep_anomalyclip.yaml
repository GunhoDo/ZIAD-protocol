# VisA full-category smoke sweep for AnomalyCLIP.
# This is still paper-ineligible: iid only, epsilon 0 only, short stream length.
dataset: VisA
dataset_root: data/visa/1cls
categories:
  - candle
  - capsules
  - cashew
  - chewinggum
  - fryum
  - macaroni1
  - macaroni2
  - pcb1
  - pcb2
  - pcb3
  - pcb4
  - pipe_fryum

baselines:
  - name: AnomalyCLIP
    baseline_path: external/AnomalyCLIP
    provenance:
      scoring_mode: stream_ordered_zero_shot
      latency_semantics: wrapper_single_image
      training_source: learned_text_prompt_checkpoint
      stream_source: test/*

prevalence: 0.05
stream_types:
  - iid
contamination_epsilon:
  - 0
stream:
  seed: 0
  length: 20
  burst_length: 5

outputs:
  root: results/latest/visa_full_category_sweep_anomalyclip
  aggregate_metrics: results/latest/visa_full_category_sweep_anomalyclip/metrics_visa_full_category_sweep_anomalyclip.csv
  aggregate_manifest: results/latest/visa_full_category_sweep_anomalyclip/manifest_visa_full_category_sweep_anomalyclip.json
  crd_lite_summary: results/latest/visa_full_category_sweep_anomalyclip/crd_lite_visa_full_category_sweep_anomalyclip.csv
  status: visa_full_category_sweep_anomalyclip_complete
  notes: VisA full-category AnomalyCLIP smoke evidence only; not full P0 or paper gate.
