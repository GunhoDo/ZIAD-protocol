# MVTec AD all-category stream/epsilon smoke matrix for RareCLIP FIFO memory policy.
# This is still paper-ineligible: short length-20 streams, no review, no VisA.
dataset: MVTec AD
dataset_root: data/mvtec_ad
categories:
  - bottle
  - cable
  - capsule
  - carpet
  - grid
  - hazelnut
  - leather
  - metal_nut
  - pill
  - screw
  - tile
  - toothbrush
  - transistor
  - wood
  - zipper

baselines:
  - name: RareCLIP
    baseline_path: external/RareCLIP
    provenance:
      scoring_mode: stream_ordered_online_zero_shot_fifo
      latency_semantics: wrapper_single_image_online
      training_source: rareclip_mvtec_text_projection_checkpoint
      stream_source: test/*

prevalence: 0.05
stream_types:
  - iid
  - bursty
contamination_epsilon:
  - 0
  - 0.01
  - 0.05
memory_policy: FIFO
stream:
  seed: 0
  length: 20
  burst_length: 5

baseline_options:
  fifo_memory_size: 8

outputs:
  root: results/latest/mvtec_full_category_stream_matrix_rareclip_fifo
  aggregate_metrics: results/latest/mvtec_full_category_stream_matrix_rareclip_fifo/metrics_mvtec_full_category_stream_matrix_rareclip_fifo.csv
  aggregate_manifest: results/latest/mvtec_full_category_stream_matrix_rareclip_fifo/manifest_mvtec_full_category_stream_matrix_rareclip_fifo.json
  crd_lite_summary: results/latest/mvtec_full_category_stream_matrix_rareclip_fifo/crd_lite_mvtec_full_category_stream_matrix_rareclip_fifo.csv
  status: mvtec_full_category_stream_matrix_rareclip_fifo_complete
  notes: MVTec all-category RareCLIP FIFO stream/epsilon smoke matrix only; not full P0 or paper gate.
