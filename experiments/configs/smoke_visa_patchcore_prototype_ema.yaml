# PatchCore VisA Prototype-EMA smoke run.
# This is paper-ineligible smoke evidence only.
baseline: PatchCore
baseline_path: external/patchcore-inspection

dataset: VisA
dataset_root: data/visa/1cls
category: candle

memory_policy: Prototype-EMA
prototype_ema_memory_fraction: 0.1
prototype_ema_alpha: 0.1
prototype_ema_max_prototypes: 32
prototype_ema_batch_size: 512
calibration: none

stream_type: iid
prevalence: 0.05
contamination_epsilon: 0

stream:
  path: results/latest/stream_smoke_visa_patchcore_prototype_ema.json
  seed: 0
  length: 20
  burst_length: 5

model_cache_root: results/latest/patchcore_model_cache_visa_prototype_ema_smoke

outputs:
  scores_csv: results/latest/scores_visa_patchcore_prototype_ema.csv
  latest_run: results/latest/latest_run_visa_patchcore_prototype_ema.json
  manifest: results/latest/manifest_visa_patchcore_prototype_ema.json

provenance:
  scoring_mode: stream_ordered_offline_prototype_ema_feature_bank
  latency_semantics: offline_batch_amortized
  training_source: train/good
  stream_source: test/*
