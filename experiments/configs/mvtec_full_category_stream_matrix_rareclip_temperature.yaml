# MVTec AD all-category stream/epsilon smoke matrix for RareCLIP with calibration axis.
# This is still paper-ineligible: short length-20 streams, no review, no VisA.
dataset: MVTec AD
dataset_root: data/mvtec_ad
categories:
  - bottle
  - cable
  - capsule
  - carpet
  - grid
  - hazelnut
  - leather
  - metal_nut
  - pill
  - screw
  - tile
  - toothbrush
  - transistor
  - wood
  - zipper

baselines:
  - name: RareCLIP
    baseline_path: external/RareCLIP
    provenance:
      scoring_mode: stream_ordered_online_zero_shot_temperature_matrix
      latency_semantics: wrapper_single_image_online
      training_source: rareclip_mvtec_text_projection_checkpoint
      stream_source: test/*

prevalence: 0.05
stream_types:
  - iid
  - bursty
contamination_epsilon:
  - 0
  - 0.01
  - 0.05
memory_policy: default/SCS
calibration:
  - none
  - temperature_scaling
calibration_temperature: 2.0
stream:
  seed: 0
  length: 20
  burst_length: 5

outputs:
  root: results/latest/mvtec_full_category_stream_matrix_rareclip_temperature
  aggregate_metrics: results/latest/mvtec_full_category_stream_matrix_rareclip_temperature/metrics_mvtec_full_category_stream_matrix_rareclip_temperature.csv
  aggregate_manifest: results/latest/mvtec_full_category_stream_matrix_rareclip_temperature/manifest_mvtec_full_category_stream_matrix_rareclip_temperature.json
  crd_lite_summary: results/latest/mvtec_full_category_stream_matrix_rareclip_temperature/crd_lite_mvtec_full_category_stream_matrix_rareclip_temperature.csv
  status: mvtec_full_category_stream_matrix_rareclip_temperature_complete
  notes: MVTec all-category RareCLIP stream/epsilon/calibration smoke matrix only; not full P0 or paper gate.
