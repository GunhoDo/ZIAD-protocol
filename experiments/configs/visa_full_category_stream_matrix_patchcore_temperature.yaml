# VisA all-category stream/epsilon smoke matrix for PatchCore with calibration axis.
# This is still paper-ineligible: short length-20 streams, no review, no full P0.
dataset: VisA
dataset_root: data/visa/1cls
categories:
  - candle
  - capsules
  - cashew
  - chewinggum
  - fryum
  - macaroni1
  - macaroni2
  - pcb1
  - pcb2
  - pcb3
  - pcb4
  - pipe_fryum

baselines:
  - name: PatchCore
    baseline_path: external/patchcore-inspection
    provenance:
      scoring_mode: stream_ordered_patchcore_temperature_matrix
      latency_semantics: wrapper_batch_amortized
      training_source: train/good
      stream_source: test/*

prevalence: 0.05
stream_types:
  - iid
  - bursty
contamination_epsilon:
  - 0
  - 0.01
  - 0.05
memory_policy: default/SCS
calibration:
  - none
  - temperature_scaling
calibration_temperature: 2.0
stream:
  seed: 0
  length: 20
  burst_length: 5

baseline_options:
  sampler: identity
  model_cache_root: results/latest/patchcore_model_cache_visa_smoke

outputs:
  root: results/latest/visa_full_category_stream_matrix_patchcore_temperature
  aggregate_metrics: results/latest/visa_full_category_stream_matrix_patchcore_temperature/metrics_visa_full_category_stream_matrix_patchcore_temperature.csv
  aggregate_manifest: results/latest/visa_full_category_stream_matrix_patchcore_temperature/manifest_visa_full_category_stream_matrix_patchcore_temperature.json
  crd_lite_summary: results/latest/visa_full_category_stream_matrix_patchcore_temperature/crd_lite_visa_full_category_stream_matrix_patchcore_temperature.csv
  status: visa_full_category_stream_matrix_patchcore_temperature_complete
  notes: VisA all-category PatchCore stream/epsilon/calibration smoke matrix only; not full P0 or paper gate.
