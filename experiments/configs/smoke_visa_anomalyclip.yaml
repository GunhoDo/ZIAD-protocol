# AnomalyCLIP VisA smoke run: validates VisA stream indexing with image-level scoring.
# This is paper-ineligible smoke evidence only.
baseline: AnomalyCLIP
baseline_path: external/AnomalyCLIP

dataset: VisA
dataset_root: data/visa/1cls
category: candle

stream_type: iid
prevalence: 0.05
contamination_epsilon: 0

stream:
  path: results/latest/stream_smoke_visa_anomalyclip.json
  seed: 0
  length: 20
  burst_length: 5

outputs:
  scores_csv: results/latest/scores_visa_anomalyclip.csv
  latest_run: results/latest/latest_run_visa_anomalyclip.json
  manifest: results/latest/manifest_visa_anomalyclip.json

provenance:
  scoring_mode: stream_ordered_zero_shot
  latency_semantics: wrapper_single_image
  training_source: learned_text_prompt_checkpoint
  stream_source: test/*
