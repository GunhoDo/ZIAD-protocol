# Fast AnomalyCLIP matrix to validate the second CLIP baseline before full P0.
baseline: AnomalyCLIP
baseline_path: external/AnomalyCLIP

dataset: MVTec AD
dataset_root: data/mvtec_ad
category: bottle

prevalence: 0.05
stream_types:
  - iid
  - bursty
contamination_epsilon:
  - 0
  - 0.01
  - 0.05
stream:
  seed: 0
  length:
  burst_length: 5

outputs:
  root: results/latest/mini_matrix
  aggregate_metrics: results/latest/mini_matrix/metrics_anomalyclip_bottle.csv
  aggregate_manifest: results/latest/mini_matrix/manifest_anomalyclip_bottle.json

provenance:
  scoring_mode: stream_ordered_zero_shot
  latency_semantics: wrapper_single_image
  training_source: learned_text_prompt_checkpoint
  stream_source: test/*
