# Fast WinCLIP matrix to validate the first CLIP baseline before full P0.
baseline: WinCLIP
baseline_path: external/WinClip

dataset: MVTec AD
dataset_root: data/mvtec_ad
category: bottle

prevalence: 0.05
stream_types:
  - iid
  - bursty
contamination_epsilon:
  - 0
  - 0.01
  - 0.05
stream:
  seed: 0
  length:
  burst_length: 5

outputs:
  root: results/latest/mini_matrix
  aggregate_metrics: results/latest/mini_matrix/metrics_winclip_bottle.csv
  aggregate_manifest: results/latest/mini_matrix/manifest_winclip_bottle.json

provenance:
  scoring_mode: stream_ordered_zero_shot
  latency_semantics: wrapper_batch_amortized
  training_source: zero_shot_text_prompts
  stream_source: test/*
