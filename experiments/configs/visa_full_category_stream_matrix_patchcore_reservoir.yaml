# VisA all-category stream/epsilon smoke matrix for PatchCore Reservoir memory policy.
# This is still paper-ineligible: short length-20 streams, no review, no MVTec.
dataset: VisA
dataset_root: data/visa/1cls
categories:
  - candle
  - capsules
  - cashew
  - chewinggum
  - fryum
  - macaroni1
  - macaroni2
  - pcb1
  - pcb2
  - pcb3
  - pcb4
  - pipe_fryum

baselines:
  - name: PatchCore
    baseline_path: external/patchcore-inspection
    provenance:
      scoring_mode: stream_ordered_patchcore_reservoir_feature_bank
      latency_semantics: wrapper_batch_amortized
      training_source: train/good
      stream_source: test/*

prevalence: 0.05
stream_types:
  - iid
  - bursty
contamination_epsilon:
  - 0
  - 0.01
  - 0.05
memory_policy: Reservoir
stream:
  seed: 0
  length: 20
  burst_length: 5

baseline_options:
  sampler: identity
  reservoir_memory_fraction: 0.1
  reservoir_seed: 0
  model_cache_root: results/latest/patchcore_model_cache_visa_reservoir_smoke

outputs:
  root: results/latest/visa_full_category_stream_matrix_patchcore_reservoir
  aggregate_metrics: results/latest/visa_full_category_stream_matrix_patchcore_reservoir/metrics_visa_full_category_stream_matrix_patchcore_reservoir.csv
  aggregate_manifest: results/latest/visa_full_category_stream_matrix_patchcore_reservoir/manifest_visa_full_category_stream_matrix_patchcore_reservoir.json
  crd_lite_summary: results/latest/visa_full_category_stream_matrix_patchcore_reservoir/crd_lite_visa_full_category_stream_matrix_patchcore_reservoir.csv
  status: visa_full_category_stream_matrix_patchcore_reservoir_complete
  notes: VisA all-category PatchCore Reservoir stream/epsilon smoke matrix only; not full P0 or paper gate.
