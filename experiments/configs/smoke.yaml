# Smoke run configuration: first success gate A
# One baseline + one dataset category + one stream -> results/latest/scores.csv
# Change baseline/category here; repo URLs/commits are pinned in baselines.yaml, while wrappers/checkpoints may still be TBD.

baseline: PatchCore
baseline_path: external/patchcore-inspection

dataset: MVTec AD
dataset_root: data/mvtec_ad
category: bottle

stream_type: iid
prevalence: 0.05
contamination_epsilon: 0

stream:
  # Generated before smoke inference and then consumed by the wrapper.
  path: results/latest/stream_smoke.json
  seed: 0
  # Optional. Omit/null to select the closest feasible no-duplicate length.
  length:
  # Used for bursty streams; ignored for iid metadata except as config context.
  burst_length: 5

outputs:
  scores_csv: results/latest/scores.csv
  latest_run: results/latest/latest_run.json
  manifest: results/latest/manifest.json
