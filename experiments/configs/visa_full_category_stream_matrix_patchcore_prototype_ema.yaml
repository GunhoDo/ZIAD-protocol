# VisA all-category stream/epsilon smoke matrix for PatchCore Prototype-EMA memory policy.
# This is still paper-ineligible: short length-20 streams, no review, no MVTec.
dataset: VisA
dataset_root: data/visa/1cls
categories:
  - candle
  - capsules
  - cashew
  - chewinggum
  - fryum
  - macaroni1
  - macaroni2
  - pcb1
  - pcb2
  - pcb3
  - pcb4
  - pipe_fryum

baselines:
  - name: PatchCore
    baseline_path: external/patchcore-inspection
    provenance:
      scoring_mode: stream_ordered_patchcore_prototype_ema_feature_bank
      latency_semantics: wrapper_batch_amortized
      training_source: train/good
      stream_source: test/*

prevalence: 0.05
stream_types:
  - iid
  - bursty
contamination_epsilon:
  - 0
  - 0.01
  - 0.05
memory_policy: Prototype-EMA
stream:
  seed: 0
  length: 20
  burst_length: 5

baseline_options:
  sampler: identity
  prototype_ema_memory_fraction: 0.1
  prototype_ema_alpha: 0.1
  prototype_ema_max_prototypes: 32
  prototype_ema_batch_size: 512
  model_cache_root: results/latest/patchcore_model_cache_visa_prototype_ema_smoke

outputs:
  root: results/latest/visa_full_category_stream_matrix_patchcore_prototype_ema
  aggregate_metrics: results/latest/visa_full_category_stream_matrix_patchcore_prototype_ema/metrics_visa_full_category_stream_matrix_patchcore_prototype_ema.csv
  aggregate_manifest: results/latest/visa_full_category_stream_matrix_patchcore_prototype_ema/manifest_visa_full_category_stream_matrix_patchcore_prototype_ema.json
  crd_lite_summary: results/latest/visa_full_category_stream_matrix_patchcore_prototype_ema/crd_lite_visa_full_category_stream_matrix_patchcore_prototype_ema.csv
  status: visa_full_category_stream_matrix_patchcore_prototype_ema_complete
  notes: VisA all-category PatchCore Prototype-EMA stream/epsilon smoke matrix only; not full P0 or paper gate.
