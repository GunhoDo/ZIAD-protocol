# VisA full-category smoke sweep for PatchCore.
# This is still paper-ineligible: iid only, epsilon 0 only, short stream length.
dataset: VisA
dataset_root: data/visa/1cls
categories:
  - candle
  - capsules
  - cashew
  - chewinggum
  - fryum
  - macaroni1
  - macaroni2
  - pcb1
  - pcb2
  - pcb3
  - pcb4
  - pipe_fryum

baselines:
  - name: PatchCore
    baseline_path: external/patchcore-inspection
    provenance:
      scoring_mode: stream_ordered_patchcore
      latency_semantics: wrapper_batch_amortized
      training_source: train/good
      stream_source: test/*

prevalence: 0.05
stream_types:
  - iid
contamination_epsilon:
  - 0
stream:
  seed: 0
  length: 20
  burst_length: 5

baseline_options:
  sampler: identity
  model_cache_root: results/latest/patchcore_model_cache_visa_smoke

outputs:
  root: results/latest/visa_full_category_sweep_patchcore
  aggregate_metrics: results/latest/visa_full_category_sweep_patchcore/metrics_visa_full_category_sweep_patchcore.csv
  aggregate_manifest: results/latest/visa_full_category_sweep_patchcore/manifest_visa_full_category_sweep_patchcore.json
  crd_lite_summary: results/latest/visa_full_category_sweep_patchcore/crd_lite_visa_full_category_sweep_patchcore.csv
  status: visa_full_category_sweep_patchcore_complete
  notes: VisA full-category PatchCore smoke evidence only; not full P0 or paper gate.
